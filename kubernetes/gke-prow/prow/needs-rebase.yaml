apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: default
  name: needs-rebase
  labels:
    app: needs-rebase
spec:
  replicas: 1
  selector:
    matchLabels:
      app: needs-rebase
  template:
    metadata:
      labels:
        app: needs-rebase
    spec:
      terminationGracePeriodSeconds: 180
      containers:
      - name: needs-rebase
        image: us-docker.pkg.dev/k8s-infra-prow/images/needs-rebase:v20260701-444074c65
        imagePullPolicy: Always
        args:
        - --dry-run=false
        - --github-app-id=$(GITHUB_APP_ID)
        - --github-app-private-key-path=/etc/github/key.pem
        - --github-endpoint=http://ghproxy
        - --github-endpoint=https://api.github.com
        - --update-period=3h
        resources:
          requests:
            cpu: 100m
            memory: 500Mi
          limits:
            cpu: 200m
            memory: 1000Mi
        env:
          - name: GITHUB_APP_ID
            valueFrom:
              secretKeyRef:
                name: github-credentials
                key: app_id
        ports:
          - name: http
            containerPort: 8888
        volumeMounts:
        - name: hmac
          mountPath: /etc/webhook
          readOnly: true
        - name: github
          mountPath: /etc/github
          readOnly: true
        - name: plugins
          mountPath: /etc/plugins
          readOnly: true
      volumes:
      - name: hmac
        secret:
          secretName: hmac-token
      - name: github
        secret:
          secretName: github-credentials
          items:
            - key: app_private_key
              path: key.pem
      - name: plugins
        configMap:
          name: plugins
---
apiVersion: v1
kind: Service
metadata:
  namespace: default
  name: needs-rebase
spec:
  selector:
    app: needs-rebase
  ports:
  - port: 80
    targetPort: 8888
