apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: oauth-policy
spec:
  targetRefs:
    - name: istio-ingressgateway
      kind: Gateway
      group: gateway.networking.k8s.io
  action: CUSTOM
  provider:
    name: oauth2-proxy
  rules:
  - to:
    # we want to force auth to argo.k8s.io/* except /api/badge for embedding badges in README.md
    - operation:
        hosts:
        - argo.k8s.io
        notPaths:
        - "/api/badge"
    # we want to force auth to atlantis.k8s.io/* except /events
    - operation:
        hosts:
        - atlantis.k8s.io
        notPaths:
        - "/events"
