# NOTE: TLS is handled via a GCP Certificate Map named 'k8s-io-cert-map'
# that must be created in the kubernetes-public project. The cert map should
# reference the same domains as certificate-prod.yaml.
# See: https://cloud.google.com/certificate-manager/docs/overview
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: k8s-io
  namespace: k8s-io-prod
  labels:
    app: k8s-io
  annotations:
    networking.gke.io/load-balancer-ip-addresses: k8s-io-ingress-prod
    networking.gke.io/certmap: k8s-io-cert-map
spec:
  gatewayClassName: gke-l7-global-external-managed
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Same
  - name: https
    port: 443
    protocol: HTTPS
    allowedRoutes:
      namespaces:
        from: Same
    tls:
      mode: Terminate
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: k8s-io-v6
  namespace: k8s-io-prod
  labels:
    app: k8s-io
  annotations:
    networking.gke.io/load-balancer-ip-addresses: k8s-io-ingress-prod-v6
    networking.gke.io/certmap: k8s-io-cert-map
spec:
  gatewayClassName: gke-l7-global-external-managed
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Same
  - name: https
    port: 443
    protocol: HTTPS
    allowedRoutes:
      namespaces:
        from: Same
    tls:
      mode: Terminate
