# HTTPRoutes for k8s-io vanity redirects.
# These are applied per-environment (k8s-io-prod or k8s-io-canary namespace)
# via deploy.sh which sets the --namespace flag.
#
# The Gateways are named 'k8s-io' and 'k8s-io-v6' in each namespace.
# Routes that need nginx backend (go-get, get.k8s.io, complex regex redirects)
# reference the 'k8s-io' Service in the same namespace.

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect for all hosts
# ---------------------------------------------------------------------------
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: k8s-io-http-redirect
  labels:
    app: k8s-io
spec:
  parentRefs:
  - name: k8s-io
    sectionName: http
  - name: k8s-io-v6
    sectionName: http
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
---
# ---------------------------------------------------------------------------
# k8s.io: route go-get and healthz to nginx backend; redirect everything else
# to kubernetes.io.
# ---------------------------------------------------------------------------
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: k8s-io-main
  labels:
    app: k8s-io
spec:
  parentRefs:
  - name: k8s-io
    sectionName: https
  - name: k8s-io-v6
    sectionName: https
  hostnames:
  - k8s.io
  - www.k8s.io
  rules:
  # Health check endpoint served by nginx.
  - matches:
    - path:
        type: Exact
        value: /_healthz
    backendRefs:
    - name: k8s-io
      port: 80
  # go-get requests need nginx to return the go-import HTML meta tags.
  - matches:
    - queryParams:
      - name: go-get
        value: "1"
    backendRefs:
    - name: k8s-io
      port: 80
  # All other traffic redirects to kubernetes.io preserving the path.
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        hostname: kubernetes.io
        statusCode: 301
---
# ---------------------------------------------------------------------------
# x-k8s.io: redirect all traffic to kubernetes.io to prove domain ownership.
# ref: https://git.k8s.io/community/sig-architecture/api-review-process.md
# ---------------------------------------------------------------------------
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: x-k8s-io
  labels:
    app: k8s-io
spec:
  parentRefs:
  - name: k8s-io
    sectionName: https
  - name: k8s-io-v6
    sectionName: https
  hostnames:
  - x-k8s.io
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        hostname: kubernetes.io
        path:
          type: ReplaceFullPath
          replaceFullPath: /
        statusCode: 301
---
